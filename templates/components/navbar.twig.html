<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* ============================================================ *\
           Reset
        \* ============================================================ */
        * {
            margin: 0;
            padding: 0;
            text-decoration: none;
            list-style: none;
        }

        /* ============================================================ *\
           Base
        \* ============================================================ */
        body {
            font-family: 'Helvetica';
        }

        header {
            height: 100vh;
            width: 100vw;
        }

        /* ============================================================ *\
           Navbar — Ribbon
        \* ============================================================ */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            background-color: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 100;

        }

        .navbar a {
            color: black;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: bold;
            opacity: 1;
            transition: opacity 0.4s ease;
        }

        .navbar.menu-open .logo {
            opacity: 0;
            pointer-events: none;
        }

        /* ============================================================ *\
           Nav links — Desktop
        \* ============================================================ */
        .nav-links {
            display: flex;
            align-items: center;
        }

        .nav-links {
            display: flex;
            align-items: center;
            position: fixed;
            top: 0;
            right: 0;
            height: 48px;
            padding: 0 20px;
            z-index: 100;
        }
        
        .nav-links ul {
            display: flex;
            font-size: 1rem;
        }

        .nav-links ul li {
            margin: 0 25px;
        }

        .nav-links a {
            color: rgb(4, 4, 4);
            transition: color 0.2s ease;
        }

        .nav-links a:hover {
            color: rgb(0, 0, 0);
        }

        /* ============================================================ *\
           Hamburger icon
        \* ============================================================ */
        #nav-toggle {
            display: none;
            cursor: pointer;
            flex-shrink: 0;
            width: 46px;
            height: 46px;
            align-items: center;
            justify-content: center;
        }

        .bar1, .bar2 {
            width: 16px;
            height: 2px;
            background-color: black;
            margin: 2px 0;
            border-radius: 1px;
            transition: 0.4s;
        }

        #nav-toggle.active .bar1 {
            transform: translate(0, 3px) rotate(-45deg);
        }

        #nav-toggle.active .bar2 {
            transform: translate(0, -3px) rotate(45deg);
        }

        /* ============================================================ *\
           Mobile — max-width: 900px
        \* ============================================================ */
        @media screen and (max-width: 900px) {
            #nav-toggle {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }

            .nav-links {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100vh;
                display: flex;
                padding-top: 48px;
                box-sizing: border-box;
                background-color: rgba(255, 255, 255, 0.95);
                transform: translateY(-100%);
                transition: transform 0.5s ease-in-out;
                pointer-events: none;
                z-index: 99;
                align-items: flex-start;
            }

            .nav-links.mobile-menu {
                transform: translateY(0);
                pointer-events: all;
            }

            .nav-links ul {
                flex-direction: column;
                align-items: flex-start;
                margin-left: 20px;
                font-size: 1.6rem;
                color: rgb(4, 4, 4);
            }

            .nav-links ul li {
                margin: 0;
            }

            .nav-links ul li:not(:last-child) {
                margin-bottom: 20px;
            }

            .nav-links ul li {
                opacity: 0;
                transform: translateY(20px);
                transition: opacity 0.3s ease, transform 0.3s ease;
            }

            .nav-links.mobile-menu ul li {
                opacity: 1;
                transform: translateY(0);
            }

            .nav-links.mobile-menu ul li:nth-child(1) { transition-delay: 0.2s; }
            .nav-links.mobile-menu ul li:nth-child(2) { transition-delay: 0.3s; }
            .nav-links.mobile-menu ul li:nth-child(3) { transition-delay: 0.4s; }
            .nav-links.mobile-menu ul li:nth-child(4) { transition-delay: 0.5s; }
            .nav-links.mobile-menu ul li:nth-child(5) { transition-delay: 0.6s; }
            .nav-links.mobile-menu ul li:nth-child(6) { transition-delay: 0.7s; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="#" class="logo">Web4All</a>
        <div id="nav-toggle">
            <div class="bar1"></div>
            <div class="bar2"></div>
        </div>
    </nav>

    <div class="nav-links">
        <ul>
            <li><a href="#">Accueil</a></li>
            <li><a href="#">Compte</a></li>
            <li><a href="#">Favoris</a></li>
            <li><a href="#">Annonces</a></li>
            <li><a href="#">Aide & Support</a></li>
            <li><a href="#">Langue</a></li>
        </ul>
    </div>

    <header></header>

    <script>
        const navLinks = document.querySelector(".nav-links");
        const navbar = document.querySelector(".navbar");

        document.querySelector("#nav-toggle").addEventListener("click", function () {
            this.classList.toggle("active");
            navLinks.classList.toggle("mobile-menu");
            navbar.classList.toggle("menu-open");
        });
    </script>
</body>
</html>
