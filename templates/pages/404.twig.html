{% extends "base.twig.html" %}

{% block title %}Page introuvable — Web4All{% endblock %}

{% block content %}
<div class="error-404">
    <span class="error-404__code">404</span>
    <p class="error-404__message">Page introuvable</p>
    <a href="?page=accueil" class="error-404__link">Retour à l'accueil</a>
</div>
{% endblock %}

{% block head %}
<style>
    .error-404 {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 16px;
        text-align: center;
        font-family: 'Helvetica', sans-serif;
    }

    .error-404__code {
        font-size: 10rem;
        font-weight: bold;
        color: #000;
        line-height: 1;
    }

    .error-404__message {
        font-size: 1.4rem;
        color: #555;
    }

    .error-404__link {
        margin-top: 8px;
        font-size: 1rem;
        color: #000;
        text-decoration: underline;
    }

    .error-404__link:hover {
        opacity: 0.6;
    }
</style>    
{% endblock %}
